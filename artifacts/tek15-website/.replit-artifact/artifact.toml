kind = "web"
previewPath = "/"
title = "TEK15.CA"
version = "1.0.0"
id = "artifacts/tek15-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25676

[services.development]
run = "pnpm --filter @workspace/tek15-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tek15-website", "run", "build" ]
publicDir = "artifacts/tek15-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25676"
BASE_PATH = "/"
